<div class="journey">
    <div class="box">
        <h4 class="subtitle">{{ subtitle }}</h4>
        <div class="text">
            <p>{{ text }}</p>
            <div class="infos">
                @for (stat of stats; track stat.label) {
                <div>
                    <p>{{ stat.label }}</p>
                    <p class="highlight">{{ stat.value }}</p>
                </div>
                }
            </div>
            <app-timeline [steps]="journeySteps"></app-timeline>
        </div>
    </div>
    <div class="image code-image">
        <article class="code-card" aria-label="Cartao com resumo em codigo">
            <header class="code-card-header">
                <div class="code-dots" aria-hidden="true">
                    <span class="dot dot-danger"></span>
                    <span class="dot dot-warning"></span>
                    <span class="dot dot-muted"></span>
                </div>
                <p class="code-file">
                    <span class="status" aria-hidden="true"></span>
                    {{ codeSnippet.fileName }}
                </p>
            </header>

            <div class="code-card-body">
                <div class="code-block" aria-label="Bloco de codigo com apresentacao pessoal"><code>
@for (line of codeSnippet.lines; track line.number) {
<span class="line" [class.line-gap]="line.gapBefore">
  <span class="line-number">{{ line.number }}</span><span class="line-text" [class.indent]="line.indent">
    @for (part of line.parts; track $index) {
    <span [class]="part.cssClass || ''">{{ part.text }}</span>
    }
  </span>
</span>
}
        </code></div>
            </div>
        </article>
    </div>
</div>
