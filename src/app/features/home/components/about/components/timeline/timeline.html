<div #timelineContainer class="timeline" aria-label="Linha do tempo da minha jornada">
    <span class="timeline-progress" aria-hidden="true"></span>
    @for (step of steps(); track step.title) {
    <article #stepElement class="timeline-item">
        <span class="timeline-node" aria-hidden="true"></span>
        <div class="timeline-content">
            <p class="timeline-period">{{ step.period }}</p>
            <h5 class="timeline-title">{{ step.title }}</h5>
            <p class="timeline-description">{{ step.description }}</p>
        </div>
    </article>
    }
</div>
