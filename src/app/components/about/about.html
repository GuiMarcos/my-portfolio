<section id="about" class="about-section">
  <div class="container content">
    <h2 class="title">{{ sectionTitle }}</h2>
    <p class="description">{{ description }}</p>
    <div class="cards">
      @for (card of cards; track card.title) {
      <div class="card">
        <div class="icon"><lucide-icon [img]="card.icon"></lucide-icon></div>
        <h4 class="card-title">{{ card.title }}</h4>
        <p class="card-text">{{ card.text }}</p>
      </div>
      }
    </div>
    <div class="journey">
      <div class="box">
        <h4 class="subtitle">{{ journey.subtitle }}</h4>
        <div class="text">
          <p>{{ journey.text }}</p>
          <div class="infos">
            @for (stat of journey.stats; track stat.label) {
            <div>
              <p>{{ stat.label }}</p>
              <p class="highlight">{{ stat.value }}</p>
            </div>
            }
          </div>
        </div>
      </div>
      <div class="image">
        <img [ngSrc]="journey.image.src" width="300" height="300" [alt]="journey.image.alt" />
      </div>
    </div>
  </div>
</section>
