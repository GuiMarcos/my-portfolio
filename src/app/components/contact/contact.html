<section class="contact-section" id="contact">
  <div class="content container">
    <h2 class="title">{{ sectionTitle }}</h2>
    <p class="description">{{ description }}</p>
    <div class="wrapper">
      <div class="infos">
        <h4 class="subtitle">{{ infosTitle }}</h4>
        <div class="cards">
          @for (item of contactItems; track item.label) {
          <div class="card">
            <div class="card-icon">
              <lucide-icon [img]="item.icon"></lucide-icon>
            </div>
            <div class="card-text">
              <p class="label">{{ item.label }}</p>
              <p class="info">{{ item.info }}</p>
            </div>
          </div>
          }
        </div>
        <div class="banner">
          <h4 class="banner-title">{{ banner.title }}</h4>
          <p class="banner-text">{{ banner.text }}</p>
        </div>
      </div>
      <div class="contact-box card">
        <h4 class="card-title">{{ form.title }}</h4>
        @for (field of form.fields; track field.id) {
        <div class="input-box">
          <label [for]="field.id">{{ field.label }}</label>
          <input [type]="field.type" [name]="field.name" [id]="field.id" [attr.autocomplete]="field.autocomplete ?? null">
        </div>
        }
        <div class="input-box">
          <label for="messageInput">{{ form.messageLabel }}</label>
          <textarea id="messageInput" name="mensagem"></textarea>
        </div>
        <button class="btn-solid"><lucide-icon [img]="Send" /> {{ form.submitLabel }}</button>
      </div>
    </div>
  </div>
</section>
