<section id="portfolio" class="portfolio-section">
  <div class="container content">
    <h2 class="title">{{ sectionTitle }}</h2>
    <p class="description">{{ description }}</p>
    <div class="cards">
      @for (project of projects(); track project.title) {
      <a class="card card-link" [href]="project.liveUrl" target="_blank" rel="noopener noreferrer">
        <div class="image">
          <img [src]="project.previewUrl" [alt]="project.repositoryName + ' preview'" loading="lazy" decoding="async"
            (error)="onImageError($event)" />
        </div>
        <h4 class="card-title" [title]="project.title">{{ project.title }}</h4>
        <p class="card-text">{{ project.description }}</p>
        <div class="techs">
          @for (tech of project.techs; track tech) {
          <span>{{ tech }}</span>
          }
        </div>
      </a>
      }
    </div>
    <button class="all-projects-btn btn-outline" type="button" routerLink="/allProjects">{{ allProjectsLabel }}</button>
  </div>
</section>
